name: Lean CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Sanity check repository root
        run: |
          pwd
          ls -la
          ls -l lakefile.toml

      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: .

      - name: Lake update
        run: lake update

      - name: Build
        run: lake build
